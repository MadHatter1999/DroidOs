# Per-service system accounts (spec §31). Each DroidOS service runs under its own
# restricted account and receives only the permissions it requires.
# Installed to /usr/lib/sysusers.d/droidos.conf.

u droid-supervisor   - "DroidOS supervisor"        /var/lib/droidos -
u droid-safety       - "DroidOS safety gateway"    /var/lib/droidos -
u droid-hardware     - "DroidOS hardware layer"    /var/lib/droidos -
u droid-perception   - "DroidOS perception"        /var/lib/droidos -
u droid-navigation   - "DroidOS navigation"        /var/lib/droidos -
u droid-motion       - "DroidOS motion"            /var/lib/droidos -
u droid-language     - "DroidOS language"          /var/lib/droidos -
u droid-diagnostics  - "DroidOS diagnostics"       /var/lib/droidos -
u droid-update       - "DroidOS updater"           /var/lib/droidos -

# Group allowing selected services to publish on the runtime bus.
g droid-bus          -
m droid-supervisor   droid-bus
m droid-safety       droid-bus
m droid-perception   droid-bus
m droid-navigation   droid-bus
m droid-motion       droid-bus
m droid-language     droid-bus
m droid-diagnostics  droid-bus
