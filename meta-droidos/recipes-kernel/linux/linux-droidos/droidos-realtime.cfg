# Real-time configuration (spec §5). PREEMPT_RT where the board kernel supports it.
# This does NOT replace the independent motor controllers; Linux handles high-level
# robotics processing while dedicated MCUs handle immediate electrical/mechanical
# safety (spec §24).
CONFIG_PREEMPT_RT=y
CONFIG_HIGH_RES_TIMERS=y
CONFIG_NO_HZ_FULL=y
CONFIG_CPU_ISOLATION=y
CONFIG_RCU_NOCB_CPU=y
