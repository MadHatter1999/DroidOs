# DroidOS distribution definition (spec §4, §5, §6).
# Built with the Yocto Project (Scarthgap 5.0 LTS). Pin exact release tags and
# commit hashes in your build manifest rather than following branches (spec §6).

DISTRO = "droidos"
DISTRO_NAME = "DroidOS"
DISTRO_VERSION = "1.0.0"
DISTRO_CODENAME = "gonk"
SDK_VENDOR = "-droidossdk"
MAINTAINER = "DroidOS project"

# Kernel is branded but not rewritten (spec §5): Linux 6.x-droidos.
DROIDOS_KERNEL_SUFFIX ?= "droidos"

# ---------------------------------------------------------------------------- #
# Distro features
# ---------------------------------------------------------------------------- #
DISTRO_FEATURES:append = " systemd usrmerge seccomp security"
DISTRO_FEATURES:remove = " sysvinit x11"
INIT_MANAGER = "systemd"
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_dev_manager = "systemd"

# Real-time where the board kernel supports it (spec §5). PREEMPT_RT makes Linux
# substantially more preemptible for time-sensitive workloads; it does NOT replace
# the independent motor controllers.
DROIDOS_RT ?= "1"

# ---------------------------------------------------------------------------- #
# Security & update posture (spec §31, §33)
# ---------------------------------------------------------------------------- #
# Read-only root filesystem with A/B slots and RAUC-based signed updates.
IMAGE_FEATURES:append = " read-only-rootfs"
DROIDOS_UPDATE_STRATEGY ?= "rauc-ab"
DISTRO_FEATURES:append = " rauc"

# Sign kernel + bundles. Keys are provided out-of-band by the build system and are
# never checked into the source tree.
DROIDOS_SIGN_KEYDIR ?= "${TOPDIR}/keys"

# ---------------------------------------------------------------------------- #
# Preferred versions (pin exact values in the build manifest)
# ---------------------------------------------------------------------------- #
PREFERRED_VERSION_linux-droidos ?= "6.6%"
# ROS 2 Lyrical Luth (LTS, May 2026 -> May 2031) validated with this distro.
DROIDOS_ROS_DISTRO ?= "lyrical"

# Provider-neutral local inference is available but optional (spec §15).
DROIDOS_LOCAL_LLM ?= "llama-cpp"

# ---------------------------------------------------------------------------- #
# Baseline image contents contributed by DroidOS recipes
# ---------------------------------------------------------------------------- #
DISTRO_EXTRA_RDEPENDS += " \
    droidos-supervisor \
    droidos-safety-gateway \
    droidos-runtime \
    droidos-interfaces \
    droidos-bodies \
"

# A successful boot must NOT enable movement; motor power defaults disabled and the
# supervisor only permits motion after all checks pass (spec §8, §40). Enforced by
# the runtime + systemd ordering, not by the image build.
