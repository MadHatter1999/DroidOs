# DroidOS shared distribution layer (spec §6.1).
# Everything common to all droids lives here; board specifics live in
# meta-droidos-rpi and meta-droidos-tegra.

BBPATH .= ":${LAYERDIR}"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "droidos"
BBFILE_PATTERN_droidos = "^${LAYERDIR}/"
BBFILE_PRIORITY_droidos = "20"

LAYERVERSION_droidos = "1"
LAYERSERIES_COMPAT_droidos = "scarthgap"

# DroidOS depends on core, OpenEmbedded and the ROS layer.
LAYERDEPENDS_droidos = "core openembedded-layer"
