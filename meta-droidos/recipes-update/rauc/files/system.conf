# RAUC system configuration for DroidOS A/B updates (spec §33).
# RAUC installs signed bundles into the inactive slot, the bootloader tries it,
# boot-health checks confirm required services started, and a failed boot rolls
# back to the previous slot automatically.

[system]
compatible=droidos
bootloader=uboot
mountprefix=/run/rauc
data-directory=/var/lib/droidos/rauc
# Recovery/state partitions are never touched by updates (spec §33, §34).

[keyring]
path=/etc/rauc/keyring.pem

[handlers]
post-install=/usr/lib/droidos/rauc-post-install

# --- A/B root filesystem slots (spec §33) --- #
[slot.rootfs.0]
device=/dev/disk/by-partlabel/rootA
type=ext4
bootname=A

[slot.rootfs.1]
device=/dev/disk/by-partlabel/rootB
type=ext4
bootname=B
