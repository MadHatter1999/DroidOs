# Simulation backend configuration (spec §26) for the wheeled body.

simulation:
  engine: mujoco
  model: r2-mk1.mjcf
  timestep: 0.01
  realtime_factor: 1.0
  publish_camera: true
  publish_contacts: false
  publish_imu: true
  publish_lidar: true
  fault_injection:
    enabled: true
    supported:
      - motor_overheat
      - sensor_dropout
      - localization_loss
      - safety_link_loss
