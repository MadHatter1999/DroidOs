forbidden_patterns:
  - "rm -rf /"
  - "rm -rf /*"
  - "mkfs"
  - "dd if="
  - ":(){ :|:& };:"
  - "chmod -R 777 /"
  - "chown -R"
  - "> /dev/sd"
  - "> /dev/nvme"
