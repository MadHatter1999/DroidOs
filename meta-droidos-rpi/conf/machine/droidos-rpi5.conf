#@TYPE: Machine
#@NAME: droidos-rpi5
#@DESCRIPTION: DroidOS on Raspberry Pi 5 (spec §7.1). Suitable for basic cameras,
# ROS 2, diagnostics, voice, TTS, remote or lightweight local LLM, task planning,
# navigation, walking-policy inference and general droid coordination.

require conf/machine/raspberrypi5.conf

MACHINEOVERRIDES =. "droidos-rpi5:"

PREFERRED_PROVIDER_virtual/kernel = "linux-droidos"
DROIDOS_RT = "1"

# Pi camera + cooling + boot (spec §6.2).
MACHINE_FEATURES:append = " vc4graphics"
RPI_EXTRA_CONFIG = "dtparam=fan_temp0=50000"
KERNEL_DEVICETREE:append = " broadcom/bcm2712-rpi-5-b.dtb"

# The reference compute level: no GPU inference assumed (spec §7). Accelerated
# services must have a CPU-compatible fallback.
DROIDOS_LOCAL_LLM = "llama-cpp"
DROIDOS_GPU_INFERENCE = "0"
