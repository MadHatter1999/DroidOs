# DroidOS Raspberry Pi board layer (spec §6.2).
BBPATH .= ":${LAYERDIR}"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb ${LAYERDIR}/recipes-*/*/*.bbappend"
BBFILE_COLLECTIONS += "droidos-rpi"
BBFILE_PATTERN_droidos-rpi = "^${LAYERDIR}/"
BBFILE_PRIORITY_droidos-rpi = "25"
LAYERVERSION_droidos-rpi = "1"
LAYERSERIES_COMPAT_droidos-rpi = "scarthgap"
LAYERDEPENDS_droidos-rpi = "droidos raspberrypi"
