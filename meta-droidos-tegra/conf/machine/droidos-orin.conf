#@TYPE: Machine
#@NAME: droidos-orin
#@DESCRIPTION: DroidOS on NVIDIA Jetson Orin (spec §7.2). Suitable for multiple
# cameras, continuous object detection, depth/3D perception, local speech and TTS,
# local LLM inference, vision-language models, semantic mapping and sensor recording.
#
# The NVIDIA build MUST use a compatible vendor BSP; the BSP, Yocto release, GPU
# libraries and kernel are pinned as a tested set (spec §6.3).

require conf/machine/include/tegra-common.inc

MACHINEOVERRIDES =. "droidos-orin:"
PREFERRED_PROVIDER_virtual/kernel = "linux-droidos"

# GPU-accelerated inference available; every accelerated service still declares a
# CPU-compatible fallback and a minimum-hardware requirement (spec §7).
DROIDOS_GPU_INFERENCE = "1"
DROIDOS_LOCAL_LLM = "llama-cpp-cuda"

# CUDA / TensorRT packages contributed by the vendor layer (spec §6.3).
MACHINE_FEATURES:append = " cuda tensorrt"
DROIDOS_RT ?= "0"
