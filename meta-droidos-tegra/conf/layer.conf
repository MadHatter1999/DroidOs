# DroidOS NVIDIA Jetson board layer (spec §6.3).
BBPATH .= ":${LAYERDIR}"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb ${LAYERDIR}/recipes-*/*/*.bbappend"
BBFILE_COLLECTIONS += "droidos-tegra"
BBFILE_PATTERN_droidos-tegra = "^${LAYERDIR}/"
BBFILE_PRIORITY_droidos-tegra = "25"
LAYERVERSION_droidos-tegra = "1"
LAYERSERIES_COMPAT_droidos-tegra = "scarthgap"
# The selected vendor BSP, Yocto release, GPU libraries and kernel must be pinned
# as one tested set (spec §6.3).
LAYERDEPENDS_droidos-tegra = "droidos tegra"
