; DroidOS safety controller firmware build (spec §24).
; Implement hal_* for your board, then `pio run -e <env>`.

[platformio]
src_dir = src

[env]
build_flags = -Wall -Wextra -Werror -Os
; The control loop is portable; only the HAL is board-specific.

[env:safety-stm32]
platform = ststm32
board = nucleo_g474re            ; example: STM32G4 with CAN-FD + timers
framework = stm32cube

[env:safety-rp2040]
platform = raspberrypi
board = pico
framework = arduino

[env:native-test]
platform = native               ; compile-check + host unit tests of the loop logic
build_flags = -Wall -Wextra -DUNIT_TEST
